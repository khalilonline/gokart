[tools]
go = "1.26.0"
golangci-lint = "2.11.3"
gotestsum = "1.13.0"
prettier = "3.8.0"
hk = "1.36.0"
pkl = "0.30.2"

[settings]
color_theme = "catppuccin"

##################################################
# Test Tasks
##################################################

[tasks.unit-test]
description = "Run unit tests"
usage = '''
flag "--go-test <go_test>" help="Define to only run the specified unit test" env="GO_TEST" default=""
flag "--test-dir <test_dir>" help="Define to only run test in the specified directory" env="TEST_DIR" default="./..."
'''
env = { TEST_TYPE="unit" }
run = '''
gotestsum --format testname --hide-summary=skipped -- -run "${usage_go_test}" "${usage_test_dir}"
'''

[tasks.bench-test]
description = "Run benchmark tests"
usage = '''
flag "--go-test <go_test>" help="Define to only run the specified benchmark" env="GO_TEST" default="."
flag "--test-dir <test_dir>" help="Define to only run benchmarks in the specified directory" env="TEST_DIR" default="./..."
flag "--count <count>" help="Number of times to run each benchmark" env="BENCH_COUNT" default="1"
flag "--benchtime <benchtime>" help="Duration or iteration count per benchmark (e.g. 1s, 100x)" env="BENCH_TIME" default="1s"
'''
env = { TEST_TYPE="performance" }
run = '''
go test -bench="${usage_go_test}" -benchmem -run=^$ -count="${usage_count}" -benchtime="${usage_benchtime}" "${usage_test_dir}"
'''

##################################################
# Linting Tasks
##################################################

[tasks.lint-go]
description = "Run golangci-lint with auto-fix"
depends = ["format-go"]
run = "golangci-lint run --fix --new"

[tasks.tidy-go]
description = "Run go mod tidy"
run = "go mod tidy"

[tasks.lint-and-format-go]
description = "Runs all go code linters and formatters"
depends = ["tidy-go"]
run = "mise run lint-go"

[tasks.lint-and-format]
description = "Format all code"
depends = ["lint-go", "format-markdown", "format-yaml"]

[tasks.format-go]
description = "Format Go code"
run = "go fmt ./..."

[tasks.format-markdown]
description = "Format all Markdown files in place using prettier"
run = '''
prettier "**/*.md" --write
'''

[tasks.format-yaml]
description = "Format all YAML files in place using prettier"
run = '''
prettier "**/*.{yml,yaml}" "!.github/workflows/**" --write
'''

##################################################
# Pre-Commit Tasks
##################################################

[tasks.hooks-install]
description = "Install git hooks using hk"
run = "hk install"

[tasks.pre-commit]
description = "Manually run pre-commit hooks"
run = "hk run pre-commit"
